<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Celia's Desserts</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8212A;--yellow:#F5A623;--teal:#2ABFBF;--brown:#5C3317;
  --red-light:#FEE8E9;--yellow-light:#FEF8E7;--teal-light:#E0F7F7;--brown-light:#F5EDE8;
  --cream:#FFFDF8;--gray:#F5F3EE;--text:#3A2010;--muted:#9A8070;--border:#EDE8E0;
  --white:#ffffff;
}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ======= NAV ======= */
.nav{background:var(--white);border-bottom:3px solid var(--yellow);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:66px;position:sticky;top:0;z-index:500;box-shadow:0 2px 12px rgba(245,166,35,0.1)}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-icon{font-size:28px}
.logo-text{font-family:'Fredoka One',cursive;font-size:22px;color:var(--red);line-height:1}
.logo-sub{font-size:10px;font-weight:900;color:var(--brown);letter-spacing:3px;text-transform:uppercase}
.nav-center{display:flex;gap:4px}
.nav-tab{padding:8px 16px;border-radius:24px;border:2px solid transparent;background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--muted);transition:all .2s}
.nav-tab.active,.nav-tab:hover{background:var(--red);color:#fff;border-color:var(--red)}
.nav-right{display:flex;align-items:center;gap:10px}
.search-bar{display:flex;align-items:center;gap:6px;background:var(--gray);border-radius:20px;padding:6px 14px;border:2px solid transparent;transition:border .2s}
.search-bar:focus-within{border-color:var(--teal)}
.search-bar input{border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;width:160px;outline:none;color:var(--text)}
.search-bar span{color:var(--muted);font-size:15px}
.icon-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;transition:all .2s}
.icon-btn:hover{border-color:var(--yellow);background:var(--yellow-light)}
.badge{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:900;border:2px solid #fff}

/* ======= LAYOUT ======= */
.app{display:flex;min-height:calc(100vh - 66px)}
.sidebar{width:220px;background:var(--white);border-right:2px solid var(--border);padding:1.5rem 1rem;flex-shrink:0;position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto}
.sidebar h4{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding:0 8px}
.side-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;cursor:pointer;font-weight:700;font-size:14px;color:var(--muted);transition:all .2s;margin-bottom:3px}
.side-item:hover{background:var(--gray);color:var(--brown)}
.side-item.active{background:var(--red-light);color:var(--red)}
.side-item .si-icon{font-size:18px;width:24px;text-align:center}
.side-divider{height:1px;background:var(--border);margin:12px 0}

.main{flex:1;overflow-y:auto;padding:2rem;max-width:900px}

/* ======= PAGES ======= */
.page{display:none}
.page.active{display:block}
.page-header{margin-bottom:1.5rem}
